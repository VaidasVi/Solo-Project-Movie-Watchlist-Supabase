# Netlify build configuration

[build]
  command = "npm run build"
  publish = "dist"

# Environment variables for secrets scanning configuration
# Supabase anon keys are designed to be public and used client-side
# Omit both the keys and the dist output paths where they're bundled
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_ANON_KEY,VITE_SUPABASE_URL,VITE_OMDB_API_KEY"
  SECRETS_SCAN_OMIT_PATHS = "dist/**"

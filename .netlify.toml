# Netlify build configuration

[build]
  command = "npm run build"
  publish = "dist"

# Environment variables - set these in Netlify UI
# VITE_OMDB_API_KEY
# VITE_SUPABASE_URL
# VITE_SUPABASE_ANON_KEY

# Disable secret scanning for this project
# (Supabase anon keys are designed to be public and used client-side)
[build.environment]
  NETLIFY_USE_SYSTEM_SECRETS_SCANNING = "false"
